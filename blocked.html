<!DOCTYPE html>
<body>
  <h1>Site Blocked!</h1>
  <p id="m"></p>
  <a href="http://127.0.0.1:8080">Back to Uncram</a>
  <script>
    let s = new URLSearchParams(location.search).get('site') || 'This site';
    try {
      s = decodeURIComponent(s);
    } catch (_) {
      /* keep raw */
    }
    document.getElementById('m').innerText = s + " is blocked.";
  </script>
</body>
